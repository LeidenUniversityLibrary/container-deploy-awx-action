name: Deploy container using AWX (reusable)

on:
  workflow_call:
    inputs:
      image:
        description: "Fully-qualified image name, e.g. ghcr.io/org/app"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string
      env_file_name:
        description: "Name of the github secret containing the .env file content (optional)"
        required: false
        type: string
jobs:
  deploy-awx:
    runs-on:
      - oas-github-runner

    steps:
      - name: Launch AWX job
        id: launch
        env:
          AWX_JOB_URL: ${{ secrets.AWX_JOB_URL }}
          AWX_TOKEN: ${{ secrets.AWX_TOKEN }}
          IMAGE: ${{ inputs.image }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ENV_FILE_CONTENT: ${{ secrets.STAGING_ENV_FILE }} # has to be updated to more generic name later
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Launching AWX deploy job"

          payload=$(jq -nc \
            --arg image "$IMAGE" \
            --arg image_tag "$IMAGE_TAG" \
            --arg registry_token "$REGISTRY_TOKEN" \
            --arg registry_user "$REGISTRY_USER" \
            --arg env_file "${ENV_FILE_CONTENT:-}" \
            '{
              extra_vars:{
                image:$image,
                image_tag:$image_tag,
                registry_token:$registry_token,
                registry_user:$registry_user,
                env_file_content:$env_file
              }
            }')

          resp="$(curl -sSf -X POST \
            -H "Authorization: Bearer ${AWX_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "${AWX_JOB_URL}")"
          job_id="$(echo "$resp" | jq -r '.job')"
          if [[ -z "$job_id" || "$job_id" == "null" ]]; then
            echo "Failed to parse job id from AWX response" >&2
            exit 1
          fi
          echo "AWX job launched: ${job_id}"
          echo "job_id=${job_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for AWX & stream logs
        env:
          AWX_JOB_URL: ${{ secrets.AWX_JOB_URL }}
          JOB_ID: ${{ steps.launch.outputs.job_id }}
          AWX_TOKEN: ${{ secrets.AWX_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          AWX_URL="${AWX_JOB_URL%%/api/*}"
          echo "Waiting for AWX job ${JOB_ID} ..."
          while :; do
            status="$(curl -sS -H "Authorization: Bearer ${AWX_TOKEN}" \
              "${AWX_URL}/api/v2/jobs/${JOB_ID}/" | jq -r '.status')"
            echo "Status: ${status}"
            case "$status" in
              successful|failed|error|canceled) break ;;
            esac
            sleep 10
          done
          echo "----- AWX job ${JOB_ID} output -----"
          curl -sS -H "Authorization: Bearer ${AWX_TOKEN}" \
            "${AWX_URL}/api/v2/jobs/${JOB_ID}/stdout/?format=txt"

          if [[ "$status" != "successful" ]]; then
            echo "AWX job ended with status: $status" >&2
            exit 1
          fi